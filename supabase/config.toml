# Supabase Local Development Configuration
# See: https://supabase.com/docs/guides/cli/config

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seeds/01_auth.sql", "./seeds/02_app.sql"]

[studio]
enabled = true
port = 54323

[local_smtp]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "5MB"

[storage.buckets.avatars]
public = true
objects_path = "./seed-assets/avatars"

[storage.buckets."post-images"]
public = true
objects_path = "./seed-assets/post-images"

[auth]
enabled = true
site_url = "ripple://"
additional_redirect_urls = ["ripple://auth/callback"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.external.apple]
enabled = false

[auth.external.google]
enabled = false

[analytics]
enabled = false

[experimental]
orioledb_version = ""
s3_host = ""

[functions.purge-deleted-posts]
verify_jwt = false

[functions.send-notification-push]
verify_jwt = false
