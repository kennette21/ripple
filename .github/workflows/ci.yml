name: CI

on:
  pull_request:
    paths:
      - app/**
      - src/**
      - supabase/functions/**
      - scripts/**
      - package.json
      - package-lock.json
      - tsconfig.json
      - expo-env.d.ts
      - app.json
      - eslint.config.js
      - babel.config.js
      - metro.config.js
      - .github/workflows/ci.yml
  push:
    paths:
      - app/**
      - src/**
      - supabase/functions/**
      - scripts/**
      - package.json
      - package-lock.json
      - tsconfig.json
      - expo-env.d.ts
      - app.json
      - eslint.config.js
      - babel.config.js
      - metro.config.js
      - .github/workflows/ci.yml

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck and lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint
