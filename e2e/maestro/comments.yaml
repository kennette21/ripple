appId: com.proxy.ripple
name: Comment composer transitions
tags:
  - comments
---
- runFlow:
    file: subflows/login.yaml
    env:
      EMAIL: "cicero@gmail.com"

- scrollUntilVisible:
    element:
      id: "comments-toggle-10000000-0000-4000-8000-000000000003"
    direction: DOWN
    timeout: 20000
- tapOn:
    id: "comments-toggle-10000000-0000-4000-8000-000000000003"
- scrollUntilVisible:
    element:
      id: "comment-edit-50000000-0000-4000-8000-000000000002"
    direction: DOWN
    timeout: 10000
    centerElement: true

# Edit -> scroll away -> Reply.
- tapOn:
    id: "comment-edit-50000000-0000-4000-8000-000000000002"
- assertVisible: "Editing comment"
- assertVisible:
    id: "comment-composer-input-10000000-0000-4000-8000-000000000003"
- assertVisible: "Save comment"
- swipe:
    start: "50%, 56%"
    end: "50%, 18%"
    duration: 500
- tapOn:
    id: "comment-reply-50000000-0000-4000-8000-000000000004"
- assertVisible: "Replying to Marcus Aurelius: I love that tiny orange flag against the blue."
- assertVisible:
    id: "comment-composer-input-10000000-0000-4000-8000-000000000003"
- assertVisible: "Send reply"

# Reply -> scroll away -> Edit.
- swipe:
    start: "50%, 56%"
    end: "50%, 18%"
    duration: 500
- tapOn:
    id: "comment-edit-50000000-0000-4000-8000-000000000002"
- assertVisible: "Editing comment"
- assertVisible:
    id: "comment-composer-input-10000000-0000-4000-8000-000000000003"
- assertVisible: "Save comment"

# Closing the mode removes the one active composer.
- tapOn: "Cancel editing comment"
- assertNotVisible:
    id: "comment-composer-10000000-0000-4000-8000-000000000003"

# Create and delete a real comment so the mutation path remains covered and
# the seeded database is left unchanged when the flow succeeds.
- tapOn: "Write a comment"
- inputText: "Maestro comment lifecycle"
- tapOn: "Post comment"
- scrollUntilVisible:
    element:
      text: ".*Maestro comment lifecycle.*"
    direction: DOWN
    timeout: 10000
    centerElement: true
- longPressOn: ".*Maestro comment lifecycle.*"
- tapOn: "Delete comment"
- tapOn: "Delete"
- extendedWaitUntil:
    notVisible: ".*Maestro comment lifecycle.*"
    timeout: 10000
