appId: com.proxy.ripple
name: Private post is hidden from another user
---
- launchApp:
    clearState: true
    clearKeychain: true

- extendedWaitUntil:
    visible: "you@example.com"
    timeout: 15000
- tapOn: "you@example.com"
- inputText: "julius.caesar@gmail.com"
- tapOn: "Enter your password"
- inputText: "12345678"
- hideKeyboard
- tapOn: "Sign In"
- extendedWaitUntil:
    visible:
      id: "feed-list"
    timeout: 15000

- openLink: "ripple:///user/00000000-0000-4000-8000-000000000004"
- extendedWaitUntil:
    visible: "@cicero"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: "Two completely different kinds of graphic energy."
    direction: DOWN
    timeout: 15000
- assertNotVisible: "A private note from Cicero about the next place he wants to explore."
