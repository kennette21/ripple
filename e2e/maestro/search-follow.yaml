appId: com.proxy.ripple
name: Search follow state
tags:
  - search-follow
---
- runFlow:
    file: subflows/login.yaml
    env:
      EMAIL: "cicero@gmail.com"

- openLink: "ripple:///(main)/(search)"
- tapOn:
    text: "Open"
    optional: true
- extendedWaitUntil:
    visible: "Search"
    timeout: 10000
- tapOn: "Search users..."
- inputText: "Marcus Aurelius"
- hideKeyboard
- extendedWaitUntil:
    visible: ".*@marcus_aurelius.*Follow$"
    timeout: 10000

# The result-scoped follow state must refresh after both mutation directions.
- tapOn:
    text: ".*@marcus_aurelius.*Follow$"
    point: "90%,50%"
- extendedWaitUntil:
    visible: ".*@marcus_aurelius.*Following$"
    timeout: 10000
- tapOn:
    text: ".*@marcus_aurelius.*Following$"
    point: "90%,50%"
- extendedWaitUntil:
    visible: ".*@marcus_aurelius.*Follow$"
    timeout: 10000
